<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项 - Todo App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 头部 -->
        <header class="app-header">
            <h1>🎀 我的待办清单</h1>
            <p id="dateDisplay"></p>
        </header>

        <!-- 输入区域 -->
        <section class="input-section">
            <div class="input-wrapper">
                <input type="text" id="taskInput" placeholder="今天要做什么？" maxlength="200" />
                <select id="prioritySelect" class="priority-select">
                    <option value="medium">🟡 中</option>
                    <option value="high">🔴 高</option>
                    <option value="low">🟢 低</option>
                </select>
                <button class="btn-add" id="btnAdd">➕ 添加任务</button>
            </div>
        </section>

        <!-- 统计栏 -->
        <section class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">全部任务</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="pendingCount">0</div>
                <div class="stat-label">未完成</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="completedCount">0</div>
                <div class="stat-label">已完成</div>
            </div>
        </section>

        <!-- 任务列表 -->
        <main class="task-list" id="taskList">
            <div class="empty-state" id="emptyState">
                <div class="icon">🌈</div>
                <p class="empty-title">暂无待办事项</p>
                <p class="empty-sub">在上方输入你的第一个任务吧！</p>
            </div>
        </main>

        <!-- 底部操作 -->
        <footer class="app-footer">
            <button class="btn-clear" id="btnClear">清空已完成</button>
            <button class="btn-clear-all" id="btnClearAll">🗑️ 全部清空</button>
        </footer>
    </div>

    <!-- 确认弹窗 -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-box">
            <div class="modal-icon" id="modalIcon">⚠️</div>
            <p class="modal-title" id="modalTitle">确认操作</p>
            <p class="modal-message" id="modalMessage">确定要执行此操作吗？</p>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" id="modalCancel">取消</button>
                <button class="modal-btn modal-btn-confirm" id="modalConfirm">确定</button>
            </div>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-box">
            <div class="modal-icon">✏️</div>
            <p class="modal-title">编辑任务</p>
            <input type="text" id="editInput" class="edit-input" maxlength="200" />
            <div class="edit-priority-row">
                <span class="edit-priority-label">优先级：</span>
                <select id="editPriority" class="priority-select">
                    <option value="high">🔴 高</option>
                    <option value="medium">🟡 中</option>
                    <option value="low">🟢 低</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" id="editCancel">取消</button>
                <button class="modal-btn modal-btn-confirm" id="editConfirm">保存</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
